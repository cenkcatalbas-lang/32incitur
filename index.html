<!DOCTYPE html>

<meta charset="UTF-8">

<title>FIFA 2026 — 32. Tur</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased}
.app{max-width:640px;margin:0 auto}
.hdr{background:var(--acc);padding:.85rem 1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:90}

.user-chip{background:rgba(255,255,255,0.15);color:#fff;padding:5px 11px;border-radius:var(--r);font-size:12px;font-weight:500;display:flex;align-items:center;gap:5px}
.adm-ind{background:rgba(255,210,0,0.22);border:0.5px solid rgba(255,210,0,0.5);color:#ffd700;padding:5px 9px;border-radius:var(--r);font-size:11px;display:none;align-items:center;gap:4px;font-weight:500}

.abtn{background:rgba(255,255,255,0.13);border:0.5px solid rgba(255,255,255,0.25);color:#fff;padding:8px 13px;border-radius:var(--r);cursor:pointer;font-size:13px;display:flex;align-items:center;gap:5px;min-height:var(--t)}

.sv{font-size:20px;font-weight:700;color:var(--acc)}.slb{font-size:11px;color:var(--txt3);margin-top:2px}

.lbr{display:flex;align-items:center;border-bottom:0.5px solid var(--bor);padding:12px 14px;gap:12px}

.lbn{font-size:15px;font-weight:600}

.lbp{font-size:16px;font-weight:700;color:var(--acc)}
.lbs{font-size:11px;color:var(--txt3)}
.bdr{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--bor)}

.bdm{font-size:12px;color:var(--txt2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.login-box{background:var(--sur);border:0.5px solid var(--bor);border-radius:var(--rl);padding:1.5rem;margin-bottom:14px;text-align:center}

.pred-mh{background:var(--acc);padding:10px 14px}
.pred-mt{font-size:13px;font-weight:600;color:#fff;margin-bottom:2px}
.pred-md{font-size:11px;color:rgba(255,255,255,0.7)}
.pred-body{padding:14px}
.skor-input-wrap{display:flex;align-items:center;gap:10px;margin-bottom:12px}

.skor-input{flex:1;padding:12px;border:1.5px solid var(--bor2);border-radius:var(--r);font-size:20px;font-weight:700;text-align:center;background:var(--sur2);color:var(--txt);letter-spacing:2px}

.save-btn{width:100%;padding:13px;background:var(--acc);color:#fff;border:none;border-radius:var(--r);cursor:pointer;font-size:15px;font-weight:500;min-height:var(--t);display:flex;align-items:center;justify-content:center;gap:7px}
.save-btn:active{opacity:0.82}
.odds-info{font-size:11px;color:var(--txt3);margin-top:8px;text-align:center}
.ap{background:var(--sur);border:0.5px solid var(--bor);border-radius:var(--rl);padding:1rem;margin-bottom:14px}
.ap h3{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--acc);display:flex;align-items:center;gap:6px}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.fg label{font-size:12px;color:var(--txt2);font-weight:500}

.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.fst{font-size:11px;color:var(--txt3);margin:12px 0 6px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.sbtn{background:var(--acc);color:#fff;border:none;border-radius:var(--r);padding:13px 18px;cursor:pointer;font-size:15px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:7px;width:100%;min-height:var(--t);margin-top:6px}
.sbtn.sm{width:auto;padding:10px 14px;font-size:13px;min-height:40px;margin-top:0}
.dbtn{background:var(--rbg);color:var(--rtxt);border:1px solid var(--rbr);border-radius:var(--r);padding:10px 14px;cursor:pointer;font-size:13px;min-height:40px}
.res-row{border-bottom:0.5px solid var(--bor);padding:12px 0}
.res-row:last-child{border-bottom:none}
.mbg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;justify-content:center}
.mbg.open{display:flex}
@media(min-width:480px){.mbg{align-items:center}}
.mdl{background:var(--sur);border-radius:var(--rl) var(--rl) 0 0;padding:1.4rem 1.2rem 2rem;width:100%;max-height:90vh;overflow-y:auto}
@media(min-width:480px){.mdl{border-radius:var(--rl);width:360px;padding:1.4rem}}
.mdld{width:40px;height:4px;background:var(--bor2);border-radius:4px;margin:0 auto 16px}
.mdl h3{font-size:16px;font-weight:600;margin-bottom:14px}
.mdl input{width:100%;padding:13px 12px;border:1px solid var(--bor2);border-radius:var(--r);font-size:16px;background:var(--sur2);color:var(--txt);margin-bottom:10px;min-height:var(--t)}
.mbs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
.bp{padding:14px;background:var(--acc);color:#fff;border:none;border-radius:var(--r);cursor:pointer;font-size:15px;font-weight:500;min-height:var(--t)}
.bs{padding:14px;background:var(--sur2);color:var(--txt);border:1px solid var(--bor2);border-radius:var(--r);cursor:pointer;font-size:15px;min-height:var(--t)}
.err{color:var(--rtxt);font-size:13px;margin:-6px 0 8px;display:none}
.empty{color:var(--txt3);font-size:14px;padding:1.5rem 0;line-height:1.6;text-align:center}
.av-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:0.5px solid var(--bor)}
.av-row:last-child{border-bottom:none}
.av56{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid var(--bor2);flex-shrink:0}
.av56i{width:56px;height:56px;border-radius:50%;background:var(--acc);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0}
.avi{flex:1}.avn{font-size:15px;font-weight:600}.avs{font-size:11px;color:var(--txt3);margin-top:2px}
.avb{display:flex;gap:6px;flex-shrink:0}
.ri2{background:var(--sur2);border-radius:var(--r);padding:10px 12px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px}
.rt{flex:1;font-size:13px;color:var(--txt2);font-style:italic;line-height:1.5}
.ra{display:flex;gap:4px;flex-shrink:0}
.ib{background:none;border:none;cursor:pointer;color:var(--txt3);padding:6px;border-radius:6px;font-size:16px;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center}
.tag-ok{background:var(--gbg);color:var(--gtxt);padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600}
.pav,.pavi,.lbav,.lbavi{transition:transform .2s ease,box-shadow .2s ease;cursor:pointer}
.pav:hover,.pavi:hover,.lbav:hover,.lbavi:hover{transform:scale(2.5);box-shadow:0 4px 16px rgba(0,0,0,0.25);z-index:10;position:relative}
.av56:hover,.av56i:hover{transform:scale(1.3);box-shadow:0 4px 16px rgba(0,0,0,0.25);transition:transform .2s ease,box-shadow .2s ease}
.sync-bar{background:var(--sur2);border:0.5px solid var(--bor);border-radius:var(--r);padding:8px 12px;margin-bottom:10px;font-size:12px;color:var(--txt3);display:flex;align-items:center;gap:8px}
.sync-bar.ok{background:var(--gbg);color:var(--gtxt);border-color:var(--gbr)}

.loading{text-align:center;padding:2rem;color:var(--txt3);font-size:14px}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="htitle"><i class="ti ti-trophy" style="font-size:20px"></i> FIFA 2026 <span class="hbadge">32. Tur</span></div>
    <div class="hright">
      <div class="adm-ind" id="admInd"><i class="ti ti-shield-check" style="font-size:13px"></i> Admin</div>
      <div class="user-chip" id="userChip" style="display:none"><i class="ti ti-user" style="font-size:13px"></i> <span id="userChipName"></span></div>
      <button class="abtn" id="admBtn" onclick="openLoginModal()"><i class="ti ti-lock" style="font-size:15px"></i></button>
    </div>
  </div>
  <div class="ct">
    <div class="tc active" id="tab-matches">
      <div class="sl">32. Tur · 28 Haz – 4 Tem 2026</div>
      <div id="mlist"><div class="loading"><i class="ti ti-loader" style="font-size:24px"></i><br>Yükleniyor...</div></div>
    </div>
    <div class="tc" id="tab-predict">
      <div class="sl">Tahmin Gir</div>
      <div id="deadline-banner"></div>
      <div id="plist"></div>
    </div>
    <div class="tc" id="tab-lb">
      <div class="sl">Sıralama</div>
      <div class="sc" id="scards"></div>
      <div class="lbw" id="lblist"></div>
    </div>
    <div class="tc" id="tab-bd">
      <div class="sl">Puan Dökümü</div>
      <div id="bdlist"></div>
    </div>
    <div class="tc" id="tab-adm">
      <div id="db-status" class="sync-bar"><i class="ti ti-database" style="font-size:14px"></i> Firebase bağlantısı kontrol ediliyor...</div>
      <div class="ap">
        <h3><i class="ti ti-edit"></i> Sonuç Gir / Düzenle</h3>
        <p style="font-size:12px;color:var(--txt2);margin-bottom:12px">Gerçek maç sonuçlarını gir. Örnek: 2-1</p>
        <div id="rentry"></div>
      </div>
    </div>
  </div>
  <div class="bnav">
    <button class="bn active" id="bn-matches" onclick="switchTab('matches')"><i class="ti ti-ball-football"></i><span>Maçlar</span></button>
    <button class="bn" id="bn-predict" onclick="switchTab('predict')"><i class="ti ti-pencil"></i><span>Tahmin</span></button>
    <button class="bn" id="bn-lb" onclick="switchTab('lb')"><i class="ti ti-trophy"></i><span>Sıralama</span></button>
    <button class="bn" id="bn-bd" onclick="switchTab('bd')"><i class="ti ti-chart-bar"></i><span>Puanlar</span></button>
    <button class="bn" id="bn-adm" style="display:none" onclick="switchTab('adm')"><i class="ti ti-settings"></i><span>Yönetim</span></button>
  </div>
</div>

<!-- Login Modal -->
<div class="mbg" id="loginModal">
  <div class="mdl"><div class="mdld"></div>
    <h3><i class="ti ti-lock"></i> Giriş Yap</h3>
    <input type="password" id="lpw" placeholder="Şifrenizi girin" inputmode="numeric" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="err" id="lerr">Hatalı şifre!</div>
    <div class="mbs"><button class="bs" onclick="closeM('loginModal')">İptal</button><button class="bp" onclick="doLogin()">Giriş</button></div>

</div>
<!-- Roast modal -->
<div class="mbg" id="roastModal">

    <h3><i class="ti ti-mood-smile"></i> Espriyi Düzenle</h3>
    <textarea id="redit" style="width:100%;min-height:90px;padding:8px;border:1px solid var(--bor2);border-radius:var(--r);background:var(--sur2);color:var(--txt);font-family:inherit;font-size:14px;margin-bottom:10px"></textarea>
    <div class="mbs"><button class="bs" onclick="closeM('roastModal')">İptal</button><button class="bp" onclick="saveRoastEdit()">Kaydet</button></div>

</div>
<!-- Avatar modal -->
<div class="mbg" id="avModal">
  <div class="mdl"><div class="mdld"></div>
    <h3 id="avModalTitle"><i class="ti ti-user-circle"></i> Avatar Yükle</h3>

    </div>
    <label style="display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px dashed var(--bor2);border-radius:var(--r);padding:20px;cursor:pointer;gap:8px;color:var(--txt2);font-size:14px;margin-bottom:10px">
      <i class="ti ti-upload" style="font-size:28px;color:var(--acc)"></i>Fotoğraf seç (JPG/PNG)

    <div class="mbs"><button class="bs" onclick="closeM('avModal')">İptal</button><button class="bp" onclick="saveAv()">Kaydet</button></div>
  </div>
</div>

<script type="module">
// ── Firebase Config ──
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';

// ── Firebase helpers ──
async function fbGet(path){
  try{const snap=await get(ref(db,path));return snap.exists()?snap.val():null;}
  catch(e){console.error('fbGet error',e);return null;}
}
async function fbSet(path,val){
  try{await set(ref(db,path),val);return true;}
  catch(e){console.error('fbSet error',e);return false;}
}
async function fbUpdate(path,val){
  try{await update(ref(db,path),val);return true;}
  catch(e){console.error('fbUpdate error',e);return false;}
}

// ── Load data from Firebase ──
async function loadData(){
  try{
    const data = await fbGet('/');
    if(data){
      matches = data.matches ? Object.values(data.matches) : JSON.parse(JSON.stringify(MATCHES_DEFAULT));
      preds = data.preds || {};
      avatars = data.avatars || {};
      if(data.roasts) roasts = data.roasts;
    } else {
      // İlk kez — default maçları yaz
      matches = JSON.parse(JSON.stringify(MATCHES_DEFAULT));
      await fbSet('/matches', matches);
    }
    setDbStatus(true);
  } catch(e){
    console.error('loadData error',e);
    matches = JSON.parse(JSON.stringify(MATCHES_DEFAULT));
    setDbStatus(false);
  }
  // Oturum
  try{const sess=localStorage.getItem('wc26sess');if(sess){const s=JSON.parse(sess);if(s.user&&USERS[s.user]){currentUser=s.user;showUserUI();}}}catch(e){}
  renderAll();
}

// Gerçek zamanlı dinleme
function listenRealtime(){
  onValue(ref(db,'/'), function(snap){
    if(!snap.exists()) return;
    const data = snap.val();
    if(data.matches) matches = Object.values(data.matches);
    if(data.preds) preds = data.preds;
    if(data.avatars) avatars = data.avatars;
    if(data.roasts) roasts = data.roasts;
    renderAll();
  });
}

// ── Helpers ──
function parseScore(s){
  if(!s) return null;
  s=s.trim();
  var m=s.match(/^(\d+)\s*[-–]\s*(\d+)$/);
  if(!m) return null;
  return {g1:parseInt(m[1]),g2:parseInt(m[2])};
}
function scoreResult(sc){
  if(!sc) return null;
  if(sc.g1>sc.g2) return '1';
  if(sc.g1<sc.g2) return '2';
  return 'x';
}
function msOdds(m,res){
  if(res==='1') return m.odds.ms.t1;
  if(res==='x') return m.odds.ms.x;
  return m.odds.ms.t2;
}
function matchStarted(m){
  try{
    var parts=m.date.split('-');
    var tparts=(m.time||'00:00').split(':');
    var matchUTC=new Date(Date.UTC(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]),parseInt(tparts[0])-3,parseInt(tparts[1]||0),0));
    return Date.now()>=matchUTC.getTime();
  }catch(e){return true;}
}
function calcScore(ukey){
  var total=0,detail=[];
  matches.forEach(function(m){
    if(!m.result) return;
    var pred=preds[ukey]&&preds[ukey][m.id];
    if(!pred||!pred.skor) return;
    var predSc=parseScore(pred.skor);
    if(!predSc) return;
    var realSc=parseScore(m.result);
    if(!realSc) return;
    var predRes=scoreResult(predSc);
    var realRes=scoreResult(realSc);
    if(predRes!==realRes) return; // sonuç yanlış -> 0 puan
    var basePts=parseFloat(msOdds(m,realRes).toFixed(2));
    var exact=(predSc.g1===realSc.g1&&predSc.g2===realSc.g2);
    var bonus=0;
    if(exact){
      var totalGoals=realSc.g1+realSc.g2;
      bonus=totalGoals===0?1:totalGoals;
    }
    var pts=parseFloat((basePts+bonus).toFixed(2));
    total+=pts;
    detail.push({mId:m.id,pts:pts,basePts:basePts,bonus:bonus,exact:exact,m:m,predSkor:pred.skor,realSkor:m.result});
  });
  return{total:parseFloat(total.toFixed(2)),detail:detail};
}
function avEl(ukey,sz){
  sz=sz||30;
  return '<div class="pavi" style="width:'+sz+'px;height:'+sz+'px;font-size:'+Math.round(sz*.36)+'px">'+(NDISP[ukey]||ukey).slice(0,2).toUpperCase()+'</div>';
}
function getRoast(ukey,rank,total){
  if((S1_SCORES[ukey]||0)+total===0) return 'Henüz tahmin bile etmedi.';
  var idx=Math.min(rank,roasts.length-1);
  var arr=roasts[idx];if(!arr||!arr.length)return'...';
  var h=0;for(var i=0;i<ukey.length;i++)h=(h*31+ukey.charCodeAt(i))%arr.length;
  return arr[h];
}
function fdate(d,t){
  try{var dt=new Date(d+'T'+(t||'00:00').substring(0,5));return dt.toLocaleDateString('tr-TR',{weekday:'short',day:'numeric',month:'short'})+' '+t;}
  catch(e){return d+' '+t;}
}

function renderMatches(){
  var el=document.getElementById('mlist');if(!el)return;
  el.innerHTML=matches.map(function(m){
    var started=matchStarted(m);
    var cols=NAMES.map(function(ukey){
      var pred=preds[ukey]&&preds[ukey][m.id];
      var predSc=pred&&pred.skor?parseScore(pred.skor):null;
      var realSc=m.result?parseScore(m.result):null;
      var cell='<div class="pce nd">—</div>';
      if(predSc){
        if(!started){
          cell='<div class="pce nd"><i class="ti ti-eye-off" style="font-size:10px"></i></div>';
        } else if(!realSc){
          cell='<div class="pce">'+pred.skor+'</div>';
        } else {
          var predRes=scoreResult(predSc);var realRes=scoreResult(realSc);
          var exact=(predSc.g1===realSc.g1&&predSc.g2===realSc.g2);
          var ok=predRes===realRes;
          var pts=0;
          if(ok){
            var base=parseFloat(msOdds(m,realRes).toFixed(2));
            var bonus=0;
            if(exact){var tg=realSc.g1+realSc.g2;bonus=tg===0?1:tg;}
            pts=parseFloat((base+bonus).toFixed(2));
          }
          var cls=exact?'ok2':(ok?'ok':'bad');
          cell='<div class="pce '+cls+'">'+pred.skor+(pts>0?'<span class="ppts">+'+pts+'</span>':'')+'</div>';
        }
      }
      return '<div class="pc">'+avEl(ukey,26)+'<div class="pn">'+NDISP[ukey]+'</div>'+cell+'</div>';
    }).join('');
    var resultHtml=m.result?'<span class="rdg rok">'+m.result+'</span>':'<span class="rdg rp">Bekleniyor</span>';
    return '<div class="mc">'+
      '<div class="mh"><span class="mhd">'+fdate(m.date,m.time)+' · '+m.venue+'</span><span class="mhn">#'+m.id+'</span></div>'+
      '<div class="mt"><div class="tn">'+m.t1+'</div><div class="vs">vs</div><div class="tn">'+m.t2+'</div></div>'+
      '<div class="rb"><span style="font-size:11px;color:var(--txt2)">Sonuç: </span>'+resultHtml+'</div>'+
      '<div class="ow"><div class="or">'+
        '<div class="oc">MS 1<span>'+m.odds.ms.t1+'</span></div>'+
        '<div class="oc">MS X<span>'+m.odds.ms.x+'</span></div>'+
        '<div class="oc">MS 2<span>'+m.odds.ms.t2+'</span></div>'+
        '<div class="oc">Alt<span>'+m.odds.au.alt+'</span></div>'+
        '<div class="oc">Üst<span>'+m.odds.au.ust+'</span></div>'+
      '</div></div>'+
      '<div style="padding:4px 12px 3px;font-size:10px;color:var(--txt3)">'+(started?'mavi=tam skor ×2 · yeşil=sonuç doğru':'<i class="ti ti-lock" style="font-size:10px"></i> Tahminler maç saatinde açılır')+'</div>'+
      '<div class="pg"><div class="pgr">'+cols+'</div></div>'+
    '</div>';
  }).join('');
}

      '<div class="fr2"><div class="fg"><label>Gerçek Skor (ör: 2-1)</label><input id="res-'+m.id+'" type="text" placeholder="2-1" value="'+(m.result||'')+'" style="text-align:center;font-size:18px;font-weight:700;letter-spacing:2px"></div>'+
      '<div class="fg" style="justify-content:flex-end"><label>&nbsp;</label><button class="sbtn sm" onclick="window.saveRes('+m.id+')"><i class="ti ti-check"></i> Kaydet</button></div></div></div>';
  }).join('');
}

function renderAvList(){
  var el=document.getElementById('avlist');if(!el)return;
  el.innerHTML=NAMES.map(function(ukey){
    var src=avatars[ukey];
    var avH=src?'<img class="av56" src="'+src+'">':'<div class="av56i">'+NDISP[ukey].slice(0,2).toUpperCase()+'</div>';
    return '<div class="av-row">'+avH+'<div class="avi"><div class="avn">'+NDISP[ukey]+'</div><div class="avs">'+(src?'Avatar yüklü':'Baş harfler')+'</div></div><div class="avb"><button class="sbtn sm" onclick="window.openAvModal(\''+ukey+'\')"><i class="ti ti-upload"></i> '+(src?'Değiştir':'Yükle')+'</button>'+(src?'<button class="dbtn" onclick="window.delAv(\''+ukey+'\')"><i class="ti ti-trash"></i></button>':'')+'</div></div>';
  }).join('');
}

function renderRoastEditor(){
  var el=document.getElementById('roasteditor');if(!el)return;
  var PL=['🥇 1.','🥈 2.','🥉 3.','4.','5.'];
  el.innerHTML=roasts.map(function(arr,pos){
    return '<div style="margin-bottom:14px"><div style="font-size:12px;font-weight:600;color:var(--txt2);margin-bottom:8px;border-bottom:0.5px solid var(--bor);padding:4px 0">'+PL[pos]+' sıra</div>'+
      arr.map(function(txt,idx){return '<div class="ri2"><div class="rt">'+txt+'</div><div class="ra"><button class="ib" onclick="window.openRoastEdit('+pos+','+idx+')"><i class="ti ti-pencil"></i></button><button class="ib" onclick="window.delRoast('+pos+','+idx+')"><i class="ti ti-trash"></i></button></div></div>';}).join('')+'</div>';
  }).join('');
}

function renderAll(){renderMatches();renderPredict();renderLeaderboard();renderBreakdown();if(isAdmin){renderRentry();}}
window.renderAll = renderAll;

// ── Actions ──
window.savePred = async function(mId){
  var ukey=currentUser;if(!ukey)return;
  if(isPastDeadline()){alert('Tahmin süresi doldu! Son: '+deadlineStr());return;}
  var inp=document.getElementById('skor-'+mId);if(!inp)return;
  var val=inp.value.trim();
  if(!parseScore(val)){alert('Geçerli skor girin! Örnek: 1-0 veya 2-1');return;}
  if(!confirm('"'+val+'" tahminini kaydetmek istiyor musunuz?\nBu işlem geri alınamaz!')){return;}
  if(!preds[ukey])preds[ukey]={};
  preds[ukey][mId]={skor:val,locked:true,ts:Date.now()};
  await savePreds();
};

window.saveRes = async function(mId){
  var val=document.getElementById('res-'+mId).value.trim();
  if(val&&!parseScore(val)){alert('Geçerli skor girin! Örnek: 2-1');return;}
  var m=matches.find(function(x){return x.id===mId;});if(!m)return;
  m.result=val||null;
  await saveMatches();
};

window.addMatch = async function(){
  var t1=document.getElementById('at1').value.trim();var t2=document.getElementById('at2').value.trim();var date=document.getElementById('adate').value;
  if(!t1||!t2||!date){alert('Takım ve tarih zorunlu!');return;}
  var id=matches.length?Math.max.apply(null,matches.map(function(m){return m.id;}))+1:1;
  matches.push({id:id,t1:t1,t2:t2,date:date,time:document.getElementById('atime').value,venue:document.getElementById('aven').value||'',
    odds:{ms:{t1:+document.getElementById('ms1').value||2,x:+document.getElementById('msx').value||3.5,t2:+document.getElementById('ms2').value||4},
    au:{alt:+document.getElementById('oalt').value||1.75,ust:+document.getElementById('oust').value||2}},result:null});
  ['at1','at2','adate','aven','ms1','msx','ms2','oalt','oust'].forEach(function(id){var e=document.getElementById(id);if(e)e.value='';});
  await saveMatches();alert('Maç eklendi!');
};

window.openAvModal = function(ukey){
  avName=ukey;
  document.getElementById('avModalTitle').innerHTML='<i class="ti ti-user-circle"></i> '+NDISP[ukey]+' — Avatar';
  document.getElementById('avfile').value='';
  var src=avatars[ukey];var img=document.getElementById('avpimg');var init=document.getElementById('avpinit');
  if(src){img.src=src;img.style.display='block';init.style.display='none';}
  else{init.textContent=NDISP[ukey].slice(0,2).toUpperCase();init.style.display='flex';img.style.display='none';}
  document.getElementById('avModal').classList.add('open');
};
window.previewAv = function(input){
  var f=input.files[0];if(!f)return;
  if(f.size>2*1024*1024){alert('Max 2 MB!');input.value='';return;}
  var r=new FileReader();r.onload=function(e){var img=document.getElementById('avpimg');var init=document.getElementById('avpinit');img.src=e.target.result;img.style.display='block';init.style.display='none';};r.readAsDataURL(f);
};
window.saveAv = async function(){
  var f=document.getElementById('avfile').files[0];if(!f){closeM('avModal');return;}
  var r=new FileReader();
  r.onload=async function(e){
    avatars[avName]=e.target.result;
    await saveAvatars();
    closeM('avModal');
  };
  r.readAsDataURL(f);
};
window.delAv = async function(ukey){
  if(!confirm(NDISP[ukey]+' avatarını sil?'))return;
  delete avatars[ukey];
  await saveAvatars();
};
window.openRoastEdit = function(pos,idx){roastEditPos=pos;roastEditIdx=idx;document.getElementById('redit').value=roasts[pos][idx];document.getElementById('roastModal').classList.add('open');};
window.saveRoastEdit = async function(){var txt=document.getElementById('redit').value.trim();if(!txt)return;roasts[roastEditPos][roastEditIdx]=txt;await saveRoasts();closeM('roastModal');};
window.delRoast = async function(pos,idx){if(roasts[pos].length<=1){alert('En az bir espri!');return;}if(!confirm('Sil?'))return;roasts[pos].splice(idx,1);await saveRoasts();};
window.addRoast = async function(){var pos=parseInt(document.getElementById('nrpos').value);var txt=document.getElementById('nrtxt').value.trim();if(!txt){alert('Espri boş!');return;}if(!roasts[pos])roasts[pos]=[];roasts[pos].push(txt);await saveRoasts();document.getElementById('nrtxt').value='';};

// ── Auth ──
window.openLoginModal = function(){
  document.getElementById('lpw').value='';
  document.getElementById('lerr').style.display='none';
  document.getElementById('loginModal').classList.add('open');
  setTimeout(function(){document.getElementById('lpw').focus();},300);
};
window.doLogin = function(){
  var pw=document.getElementById('lpw').value.trim();
  document.getElementById('lerr').style.display='none';
  if(pw===ADMIN_PW){
    isAdmin=true;currentUser=null;
    document.getElementById('bn-adm').style.display='';
    document.getElementById('admInd').classList.add('on');
    document.getElementById('userChip').style.display='none';
    document.getElementById('admBtn').innerHTML='<i class="ti ti-lock-open" style="font-size:15px"></i>';
    document.getElementById('admBtn').onclick=function(){if(confirm('Çıkış?')){isAdmin=false;document.getElementById('bn-adm').style.display='none';document.getElementById('admInd').classList.remove('on');document.getElementById('admBtn').innerHTML='<i class="ti ti-lock" style="font-size:15px"></i>';document.getElementById('admBtn').onclick=window.openLoginModal;localStorage.removeItem('wc26sess');switchTab('matches');}};
    closeM('loginModal');switchTab('adm');return;
  }
  var matched=null;
  for(var ukey in USERS){if(USERS[ukey].pw===pw){matched=ukey;break;}}
  if(matched){
    currentUser=matched;localStorage.setItem('wc26sess',JSON.stringify({user:matched,ts:Date.now()}));
    showUserUI();closeM('loginModal');switchTab('predict');
  } else {
    document.getElementById('lerr').style.display='block';
  }
};
function showUserUI(){
  var ukey=currentUser;
  document.getElementById('userChip').style.display='flex';
  document.getElementById('userChipName').textContent=NDISP[ukey];
  document.getElementById('admBtn').innerHTML='<i class="ti ti-logout" style="font-size:15px"></i>';
  document.getElementById('admBtn').onclick=function(){if(confirm('Çıkış?')){currentUser=null;document.getElementById('userChip').style.display='none';document.getElementById('admBtn').innerHTML='<i class="ti ti-lock" style="font-size:15px"></i>';document.getElementById('admBtn').onclick=window.openLoginModal;localStorage.removeItem('wc26sess');renderAll();switchTab('matches');}};
}

var TABS=['matches','predict','lb','bd','adm'];
function switchTab(name){
  TABS.forEach(function(t){
    var tc=document.getElementById('tab-'+t);if(tc)tc.classList.toggle('active',t===name);
    var bn=document.getElementById('bn-'+t);if(bn)bn.classList.toggle('active',t===name);
  });
  renderAll();window.scrollTo({top:0,behavior:'smooth'});
}
window.switchTab = switchTab;
window.closeM = function(id){document.getElementById(id).classList.remove('open');};

document.querySelectorAll('.mbg').forEach(function(bg){bg.addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});});

// ── Start ──
loadData().then(function(){listenRealtime();});
</script>
